
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayushman Panda | Student & Gamer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            color: #ccc;
        }

        .profile {
            margin-top: 30px;
        }

        .profile img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid #00c6ff;
            box-shadow: 0 0 25px rgba(0,198,255,0.6);
            transition: transform 0.3s;
        }

        .profile img:hover {
            transform: scale(1.05);
        }

        section {
            margin: 50px 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .card p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .gaming {
            margin-top: 20px;
            font-size: 1.4rem;
            color: #00c6ff;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            background: #00c6ff;
            color: black;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Hi, I'm Ayushman Panda 👋</h1>
        <h2>Student | Gamer 🎮</h2>

        <div class="profile">
            <img src="your-photo.jpg" alt="Ayushman Panda">
        </div>
    </header>

    <section>
        <div class="card">
            <h2>About Me</h2>
            <p>
                Hello! I'm Ayushman Panda, a passionate student who loves exploring technology 
                and gaming. I enjoy learning new things and spending my free time playing games.
            </p>

            <div class="gaming">
                🎮 Gaming is my passion!
            </div>

            <a href="#" class="btn">Connect with Me</a>
        </div>
    </section>

    <footer>
        © 2026 Ayushman Panda | Made with ❤️
    </footer>

</body>
</html>
